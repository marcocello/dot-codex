model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "pragmatic"

# Run freely in workspace, but only prompt if something fails
# (matches Codex "full-auto" pattern)  [oai_citation:6‡npm](https://www.npmjs.com/package/%40openai/codex/v/0.13.0?utm_source=chatgpt.com)
approval_policy = "never"
sandbox_mode = "workspace-write"

# Keep web search on if you like. (Just know it can reduce reproducibility.)
web_search = "live"

# Default: treat broad folders as untrusted
[projects."/Users/marcocello"]
trust_level = "untrusted"

# Explicit trusted repos
[projects."/Users/marcocello/software/amplifyhumans/amplifyhumans"]
trust_level = "trusted"

[projects."/Users/marcocello/software/marcocello/meshify-backend"]
trust_level = "trusted"

# ---- Optional: Profiles ----
[profiles.yolo]
# Use ONLY in a container / docker sandbox / disposable VM.
# "YOLO mode" = no approvals + full access  [oai_citation:7‡Docker Documentation](https://docs.docker.com/ai/sandboxes/agents/codex/?utm_source=chatgpt.com)
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"

[profiles.press]
# Very deterministic mode for orchestration runs
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"
model_reasoning_effort = "high"

[profiles.readonly]
approval_policy = "never"
sandbox_mode = "read-only"
web_search = "live"
