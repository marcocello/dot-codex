interface:
  display_name: "Feature Discovery"
  short_description: "Expand rough feature ideas into full user journey and use-case coverage before implementation."
  default_prompt: "I have a rough feature idea. Build a discovery canvas with JTBD, full user journey, use cases, edge/failure cases, roles, integrations, and V1/V2/V3 scope, then produce scenario seeds ready for docs/features/todo-api/FEATURE.md."
policy:
  allow_implicit_invocation: true
