model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"

approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[sandbox_workspace_write]
network_access = true
writable_roots = ["/path/to/your/workspace/example-project1", "/path/to/your/workspace/example-project2", "/path/to/your/workspace/example-project3"]

[features]
multi_agent = false

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp", "--api-key", "xx..."]