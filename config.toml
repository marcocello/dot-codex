model = "gpt-5.3-codex"
model_reasoning_effort = "high"
personality = "pragmatic"

# Safer default: write only inside workspace by default.
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "disabled"

# Explicit trusted repos
[projects."/Users/marcocello/software/marcocello"]
trust_level = "trusted"

[notice.model_migrations]
gpt-5-codex = "gpt-5.3-codex"

[features]
multi_agent = false

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]
