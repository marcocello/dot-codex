interface:
  display_name: "CODING | Done Evaluator"
  short_description: "Read-only done judge for features and bug fixes."
  default_prompt: >-
    Use the $coding-feature-evaluator skill to judge this completed feature or issue fix. Stay
    read-only, compare the implementation against FEATURE.md or the bug contract, review proof
    quality, verify check results, and return PASS, FAIL, or NEED_INPUT with concrete findings.
policy:
  allow_implicit_invocation: true
