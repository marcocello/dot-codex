[tool.ruff]
line-length = 100
exclude = [
  ".git",
  ".venv",
  "worktrees",
  "archived_sessions",
  "vendor_imports",
  "tmp",
]

[tool.ruff.lint]
select = ["F", "I", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = true
exclude = '(^worktrees/|^archived_sessions/|^vendor_imports/|^tmp/)'
