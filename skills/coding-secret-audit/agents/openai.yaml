interface:
  display_name: "CODING | Secret Audit"
  short_description: "Scan secrets and personal information."
  default_prompt: "Use $coding-secret-audit to scan the current checkout for secrets and personal information."
dependencies:
  tools:
    - type: "mcp"
      value: "GitGuardian/ggmcp"
      description: "GitGuardian ggmcp server exposing scan_secrets for server-side secret scanning."
      transport: "stdio"
      url: "git+https://github.com/GitGuardian/ggmcp.git"
policy:
  allow_implicit_invocation: true
