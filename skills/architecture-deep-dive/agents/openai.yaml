interface:
  display_name: "Architecture Deep Dive"
  short_description: "State-of-the-art architecture deep dive on a component's logic, implementation, security, cost, and bottlenecks."
  default_prompt: "Perform an architecture deep dive for this component: analyze architectural, logical, and implementation choices; identify weaknesses, flaws, limitations, performance bottlenecks, security risks, and cost inefficiencies; return prioritized findings in a single section titled ## Deep Dive Findings with root cause, evidence, confidence, and minimal corrective actions."
policy:
  allow_implicit_invocation: true
